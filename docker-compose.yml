services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traumatic_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/generated
    networks:
      - traumatic_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traumatic_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - traumatic_network

networks:
  traumatic_network:
    driver: bridge